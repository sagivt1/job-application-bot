services:
  job-application-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-application-bot:latest
    container_name: job-application-bot
    restart: unless-stopped
    env_file:
      - .env
    # llama-server runs on the host (not in a container) so it can use the AMD
    # GPU via Vulkan. This maps host.docker.internal -> the host gateway so
    # OPENAI_BASE_URL can reach it. Resolves automatically on Docker Desktop;
    # explicit here for portability.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # User CV — gitignored, never baked into the image. Read-only.
      - ./cv.md:/app/cv.md:ro
    # No ports: Telegram runs in polling mode (no inbound webhook).
